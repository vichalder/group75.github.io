<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crime Risk — SF Crime Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09060f;
      --card-border: rgba(255,255,255,0.08);
      --text-primary: #ede9f6;
      --text-secondary: #8b85a4;
      --text-muted: #49446b;
      --accent: #a855f7;
      --accent-rgb: 168, 85, 247;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 900px 550px at 50% -60px, rgba(168,85,247,0.1) 0%, transparent 70%),
        linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
      background-size: 100% auto, 48px 48px, 48px 48px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      display: flex; flex-direction: column;
    }

    /* ── NAV ─────────────────────────────────────────────────────────── */
    nav {
      flex-shrink: 0; height: 60px;
      background: rgba(9,6,15,0.9);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(168,85,247,0.1);
      display: flex; align-items: center;
      padding: 0 2rem; position: relative; z-index: 99;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-primary); text-decoration: none;
    }
    .nav-brand-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #a855f7, rgba(168,85,247,0.4));
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-brand-icon svg { width: 16px; height: 16px; color: #fff; }
    .nav-links { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .nav-links a {
      padding: 6px 14px; border-radius: 8px;
      font-size: 0.8rem; font-weight: 500; color: var(--text-secondary);
      text-decoration: none; transition: all 0.2s;
    }
    .nav-links a:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
    .nav-links a.active { background: rgba(var(--accent-rgb),0.14); color: var(--accent); }

    /* ── PAGE HEADER ─────────────────────────────────────────────────── */
    .page-header {
      flex-shrink: 0;
      padding: 18px 2rem 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.71rem; color: var(--text-muted);
      margin-bottom: 12px;
    }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--text-secondary); }
    .breadcrumb-sep { opacity: 0.45; }

    .header-main { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
    .header-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 12px;
      background: rgba(var(--accent-rgb),0.1);
      border: 1px solid rgba(var(--accent-rgb),0.22);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }
    .header-icon svg { width: 22px; height: 22px; }
    .header-text h1 {
      font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em;
    }
    .header-text p {
      font-size: 0.81rem; color: var(--text-secondary); margin-top: 3px; line-height: 1.5;
    }

    .tags { display: flex; flex-wrap: wrap; gap: 7px; }
    .tag {
      padding: 3px 10px; border-radius: 100px;
      font-size: 0.67rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(var(--accent-rgb),0.08);
      border: 1px solid rgba(var(--accent-rgb),0.22);
      color: var(--accent);
    }
    .tag-neutral {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
      color: var(--text-secondary);
    }

    /* ── PLOT AREA ───────────────────────────────────────────────────── */
    .plot-wrapper {
      flex: 1; min-height: 0;
      padding: 14px 1.5rem 1.5rem;
      display: flex; flex-direction: column;
    }
    .plot-frame {
      flex: 1;
      border-radius: 14px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow:
        0 0 0 1px rgba(var(--accent-rgb),0.07),
        0 28px 70px rgba(0,0,0,0.65),
        0 0 90px rgba(var(--accent-rgb),0.06);
    }
    iframe { width: 100%; height: 100%; border: none; display: block; background: #fff; }
  </style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-brand">
    <div class="nav-brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </div>
    SF Crime Analytics
  </a>
  <div class="nav-links">
    <a href="../index.html">Home</a>
    <a href="interactive-risk.html" class="active">Crime Risk</a>
    <a href="interactive-hourly.html">Crime by Hour</a>
    <a href="interactive-heatmap.html">Crime Heatmap</a>
    <a href="static-crime-ratio.html">Crime by District</a>
  </div>
</nav>

<div class="page-header">
  <div class="breadcrumb">
    <a href="../index.html">Home</a>
    <span class="breadcrumb-sep">›</span>
    <span>Crime Risk per district</span>
  </div>
  <div class="header-main">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Crime Risk per district</h1>
      <p>Animated choropleth showing crime distribution by district across San Francisco</p>
    </div>
  </div>
  <div class="tags">
    <span class="tag">Interactive</span>
    <span class="tag">Plotly</span>
    <span class="tag tag-neutral">Choropleth Map</span>
    <span class="tag tag-neutral">Time Animation</span>
  </div>
</div>

<div class="plot-wrapper">
  <div class="plot-frame">
    <iframe
      src="../interactive_plots/crime_risk.html"
      title="Crime Risk per district"
      loading="lazy">
    </iframe>
  </div>
</div>

</body>
</html>
